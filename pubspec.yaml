name: social_media_manager
description: Aplikasi manajemen akun media sosial.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  otp: ^3.1.4
  image_picker: ^1.0.4
  intl: ^0.18.1
  shared_preferences: ^2.2.0
  file_picker: ^8.0.0            # ⚠️ versi terbaru (compileSdk 36)
  share_plus: ^9.0.0             # versi terbaru, mendukung Kotlin built-in
  csv: ^6.0.0                    # versi terbaru
  encrypt: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/              # tempat ikon bawaan Anda
