name: Build Flutter APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          
      - run: flutter create .
      
      # --- PERBAIKAN COMPILE SDK 36 (Mendukung .gradle dan .kts) ---
      - run: |
          if [ -f android/app/build.gradle ]; then
            sed -i 's/flutter.compileSdkVersion/36/g' android/app/build.gradle
          elif [ -f android/app/build.gradle.kts ]; then
            sed -i 's/flutter.compileSdkVersion/36/g' android/app/build.gradle.kts
          fi
      # --------------------------------------------------------------
      
      - run: flutter clean
      - run: flutter pub get
      - run: flutter pub upgrade
      - run: flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
